name: Fetch chat updates

# Periodically scrape t.me/s/sgcapital, append new posts to tools/chat.jsonl,
# rebuild INDEX.md and wiki/_sources/*.md + wiki/index.md, and open a pull
# request against main if anything changed.
#
# Note: GitHub Actions `schedule` only fires on the repository's default
# branch (main). Until this file is merged to main the cron will not tick;
# use the `workflow_dispatch` button to run it manually in the meantime.

on:
  schedule:
    # 06:17 UTC daily (chosen to avoid the top of the hour).
    - cron: "17 6 * * *"
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Dry run (parse but do not append)"
        type: boolean
        default: false

permissions:
  contents: write
  pull-requests: write

# Force the runner to use Node.js 24 for JavaScript-based actions even if the
# action metadata still declares `node20`. Silences the `Node.js 20 actions are
# deprecated` warning from GitHub until actions/checkout and actions/setup-python
# publish Node.js 24 releases we can pin to.
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  fetch:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install --upgrade anthropic

      - name: Fetch new posts (dry run)
        if: ${{ github.event.inputs.dry_run == 'true' }}
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: python3 tools/fetch_chat.py --dry-run

      - name: Fetch new posts
        if: ${{ github.event.inputs.dry_run != 'true' }}
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: python3 tools/fetch_chat.py

      - name: Check for corpus changes
        id: changes
        run: |
          if git diff --quiet -- tools/chat.jsonl; then
            echo "has_new=false" >> "$GITHUB_OUTPUT"
            echo "No new posts — nothing to do."
          else
            echo "has_new=true" >> "$GITHUB_OUTPUT"
            added=$(git diff --numstat -- tools/chat.jsonl | awk '{print $1}')
            echo "added_lines=${added:-0}" >> "$GITHUB_OUTPUT"
            echo "New posts detected (+${added:-0} lines in chat.jsonl)."
          fi

      - name: Rebuild INDEX.md and wiki
        if: steps.changes.outputs.has_new == 'true'
        run: |
          python3 tools/build_index.py
          python3 tools/build_wiki.py

      - name: Open pull request
        if: steps.changes.outputs.has_new == 'true'
        uses: peter-evans/create-pull-request@v6
        with:
          branch: bot/daily-ingest
          delete-branch: true
          base: main
          title: "Daily ingest: new posts from t.me/s/sgcapital"
          commit-message: |
            Daily ingest from t.me/s/sgcapital

            Automated append of new posts to tools/chat.jsonl plus regeneration
            of INDEX.md, wiki/_sources/*.md and wiki/index.md.
          body: |
            Automated ingest of new posts from `t.me/s/sgcapital` via `tools/fetch_chat.py`.

            **What changed:**
            - `tools/chat.jsonl`: +${{ steps.changes.outputs.added_lines }} new rows.
            - `INDEX.md`: regenerated by `tools/build_index.py`.
            - `wiki/_sources/*.md` and `wiki/index.md`: regenerated by `tools/build_wiki.py`.

            **What to check before merging:**
            - Glance at the new JSONL rows — text decoded cleanly, dates look right.
            - If `ANTHROPIC_API_KEY` was available, verify that `media_description`
              fields read as short, useful summaries (not error placeholders).
            - `INDEX.md` and `wiki/index.md` diffs should be mechanical additions.

            Generated by [.github/workflows/fetch-chat.yml](.github/workflows/fetch-chat.yml).
          labels: |
            automated
            ingest
